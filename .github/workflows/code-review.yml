name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  ai-review:
    runs-on: self-hosted
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          git fetch origin "${{ github.event.pull_request.base.ref }}"
          git fetch origin "${{ github.event.pull_request.head.ref }}"
          DIFF=$(git diff "origin/${{ github.event.pull_request.base.ref }}...origin/${{ github.event.pull_request.head.ref }}" | head -c 50000)
          # Escape for JSON
          DIFF_ESCAPED=$(echo "$DIFF" | python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))")
          echo "diff=$DIFF_ESCAPED" >> $GITHUB_OUTPUT
          echo "diff_length=$(echo "$DIFF" | wc -c)" >> $GITHUB_OUTPUT

      - name: Trigger AI Review
        id: review
        run: |
          echo "Diff length: ${{ steps.diff.outputs.diff_length }} bytes"

          RESPONSE=$(curl -s -X POST "${{ secrets.CR_PLATFORM_URL }}/api/tasks" \
            -H "Content-Type: application/json" \
            -d "{\"ruleSetId\":${{ secrets.CR_RULE_SET_ID }},\"diffContent\":${{ steps.diff.outputs.diff}}}")

          TASK_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['id'])")
          echo "task_id=$TASK_ID" >> $GITHUB_OUTPUT
          echo "Review task created: #$TASK_ID"

      - name: Wait for review
        run: |
          TASK_ID=${{ steps.review.outputs.task_id }}
          MAX_WAIT=30
          for i in $(seq 1 $MAX_WAIT); do
            STATUS=$(curl -s "${{ secrets.CR_PLATFORM_URL }}/api/tasks/$TASK_ID" | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['status'])")
            echo "Task $TASK_ID status: $STATUS (attempt $i/$MAX_WAIT)"
            if [ "$STATUS" = "completed" ] || [ "$STATUS" = "failed" ]; then
              echo "final_status=$STATUS" >> $GITHUB_OUTPUT
              break
            fi
            sleep 10
          done
          echo "final_status=${STATUS:-timeout}" >> $GITHUB_OUTPUT

      - name: Post review comment
        if: steps.review.outputs.task_id != ''
        run: |
          TASK_ID=${{ steps.review.outputs.task_id }}
          RESULTS=$(curl -s "${{ secrets.CR_PLATFORM_URL }}/api/tasks/$TASK_ID/results")

          # Build comment body
          COMMENT=$(python3 << EOF
          import json, sys

          resp = json.loads('''$RESULTS''')
          results = resp.get('data', [])

          if not results:
              print("## 🤖 AI Code Review\n\n✅ **未发现问题**，代码审查通过！")
              sys.exit(0)

          errors = sum(1 for r in results if r['severity'] == 'error')
          warnings = sum(1 for r in results if r['severity'] == 'warning')
          infos = sum(1 for r in results if r['severity'] == 'info')

          body = [
              "## 🤖 AI Code Review",
              "",
              f"| 级别 | 数量 |",
              f"|------|------|",
              f"| 🔴 Error | {errors} |",
              f"| 🟡 Warning | {warnings} |",
              f"| 🔵 Info | {infos} |",
              f"| **总计** | **{len(results)}** |",
              "",
          ]

          for r in results:
              emoji = {"error": "🔴", "warning": "🟡", "info": "🔵"}.get(r['severity'], "⚪")
              body.append(f"### {emoji} {r.get('title','Issue')}")
              body.append(f"**文件**: `{r.get('filePath','unknown')}`")
              if r.get('lineNumber'):
                  body.append(f" **行号**: {r['lineNumber']}")
              if r.get('description'):
                  body.append(f"\n{r['description']}")
              if r.get('suggestion'):
                  body.append(f"\n> 💡 **建议**: {r['suggestion']}")
              body.append("")

          print("\n".join(body))
          EOF
          )

          # Post comment to PR
          echo "$COMMENT" | gh pr comment "${{ github.event.pull_request.number }}" -F -
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
