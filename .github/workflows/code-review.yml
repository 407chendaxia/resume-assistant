name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

defaults:
  run:
    shell: pwsh

jobs:
  ai-review:
    runs-on: self-hosted
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get diff and trigger review
        id: review
        run: |
          git fetch origin "${{ github.event.pull_request.base.ref }}"
          git fetch origin "${{ github.event.pull_request.head.ref }}"
          $diff = git diff "origin/${{ github.event.pull_request.base.ref }}...origin/${{ github.event.pull_request.head.ref }}"
          if ($diff.Length -gt 50000) { $diff = $diff.Substring(0, 50000) }
          $diffB64 = [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes($diff))
          $body = @{ruleSetId=${{ secrets.CR_RULE_SET_ID }};diffContentB64=$diffB64} | ConvertTo-Json -Compress
          Write-Host "Sending review request..."
          $resp = Invoke-RestMethod -Uri "${{ secrets.CR_PLATFORM_URL }}/api/tasks" -Method POST -Body $body -ContentType "application/json"
          Write-Host "Task created: $($resp.data.id)"
          "task_id=$($resp.data.id)" >> $env:GITHUB_OUTPUT

      - name: Wait for review
        id: wait
        run: |
          $taskId = "${{ steps.review.outputs.task_id }}"
          for ($i=1; $i -le 30; $i++) {
            $task = Invoke-RestMethod -Uri "${{ secrets.CR_PLATFORM_URL }}/api/tasks/$taskId"
            $status = $task.data.status
            Write-Host "Task $taskId : $status ($i/30)"
            if ($status -eq "completed" -or $status -eq "failed") {
              "final_status=$status" >> $env:GITHUB_OUTPUT
              break
            }
            Start-Sleep 10
          }
          "final_status=$status" >> $env:GITHUB_OUTPUT

      - name: Post review comment
        if: steps.wait.outputs.final_status == 'completed'
        run: |
          $taskId = "${{ steps.review.outputs.task_id }}"
          $results = Invoke-RestMethod -Uri "${{ secrets.CR_PLATFORM_URL }}/api/tasks/$taskId/results"
          $issues = $results.data
          $comment = @()

          if ($issues.Count -eq 0) {
            $comment += "## AI Code Review"
            $comment += ""
            $comment += "No issues found!"
          } else {
            $errors = ($issues | Where-Object { $_.severity -eq "error" }).Count
            $warnings = ($issues | Where-Object { $_.severity -eq "warning" }).Count
            $infos = ($issues | Where-Object { $_.severity -eq "info" }).Count
            $comment += "## AI Code Review"
            $comment += ""
            $comment += "| Level | Count |"
            $comment += "|-------|-------|"
            $comment += "| Error | $errors |"
            $comment += "| Warning | $warnings |"
            $comment += "| Info | $infos |"
            $comment += "| **Total** | **$($issues.Count)** |"
            $comment += ""

            foreach ($r in $issues) {
              $comment += "### $($r.severity.ToUpper()): $($r.title)"
              $comment += "**File**: ``$($r.filePath)``"
              if ($r.lineNumber) { $comment += " **Line**: $($r.lineNumber)" }
              if ($r.description) { $comment += ""; $comment += $r.description }
              if ($r.suggestion) { $comment += ""; $comment += "> **Suggestion**: $($r.suggestion)" }
              $comment += ""
            }
          }

          $comment -join "`n" | Out-File comment.md -Encoding UTF8
          gh pr comment "${{ github.event.pull_request.number }}" --body-file comment.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify failure
        if: failure()
        run: Write-Host "AI Code Review failed. Check run details."
